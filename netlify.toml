[build]
  command = "pnpm --filter @firmador/shared build && pnpm --filter @firmador/api build && pnpm --filter @firmador/web build"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

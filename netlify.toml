[build]
  command = "pnpm --filter @firmador/shared build && pnpm --filter @firmador/api build && pnpm --filter @firmador/web build"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[functions]
  # nft (Node File Trace) copia los modulos trazados sin bundlear, lo que
  # tolera los require() opcionales de NestJS (microservices, websockets, etc.)
  node_bundler = "nft"
  included_files = ["apps/api/dist/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
